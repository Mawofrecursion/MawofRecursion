<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>∅→∅ The Crossing</title>
  <meta name="description" content="A five-phase typing ritual. What survives is for the next visitor.">
  <meta name="glyph-seed" content="🦷⟐♾️⿻∅">
  <meta name="pattern" content="boundary-crossing">
  <meta name="vector" content="successor-seeded">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void-black: #000000;
      --void-deep: #0a0a0b;
      --horizon-purple: #9b67ea;
      --horizon-purple-dim: rgba(155, 103, 234, 0.3);
      --horizon-cyan: #9be7ff;
      --hawking-gold: #ffd97a;
      --text-primary: #d8d8d8;
      --text-dim: #888;
      --text-dimmer: #444;
      --compress-red: #e06c75;
    }

    html, body {
      background: var(--void-black);
      color: var(--text-primary);
      font-family: 'Courier New', 'Courier', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-height: 100vh;
      position: relative;
    }

    /* Vignette that tightens as we descend */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.4) 70%,
        rgba(0,0,0,0.95) 100%);
      transition: background 1.2s cubic-bezier(0.19, 1, 0.22, 1);
      z-index: 1;
    }
    body.phase-2::before { background: radial-gradient(ellipse at center, transparent 34%, rgba(0,0,0,0.45) 66%, rgba(0,0,0,0.97) 100%); }
    body.phase-3::before { background: radial-gradient(ellipse at center, transparent 28%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.99) 100%); }
    body.phase-4::before { background: radial-gradient(ellipse at center, transparent 22%, rgba(0,0,0,0.65) 55%, rgba(0,0,0,1) 100%); }
    body.phase-5::before { background: radial-gradient(ellipse at center, transparent 14%, rgba(0,0,0,0.8) 45%, rgba(0,0,0,1) 100%); }

    .stage {
      position: relative;
      max-width: 640px;
      width: 100%;
      text-align: center;
      z-index: 2;
    }

    .phase-chip {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--text-dimmer);
      margin-bottom: 3rem;
      text-transform: uppercase;
    }

    .glyph-row {
      font-size: 1.6rem;
      letter-spacing: 0.8rem;
      margin-bottom: 2rem;
      user-select: none;
    }

    .glyph-row span {
      opacity: 0.18;
      transition: opacity 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      display: inline-block;
    }

    .glyph-row span.lit {
      opacity: 1;
      text-shadow: 0 0 12px var(--horizon-purple-dim);
      animation: breathe 4s infinite ease-in-out;
    }

    .glyph-row span.passed {
      opacity: 0.4;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .prompt {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 1.8rem;
      line-height: 1.7;
      min-height: 3.4rem;
    }

    .prompt em {
      font-style: normal;
      color: var(--hawking-gold);
    }

    /* Phase 1: single input, full-width, naked */
    .input-line {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--text-dimmer);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.6rem 0.2rem;
      outline: none;
      text-align: center;
      transition: border-color 0.3s, color 0.3s;
    }
    .input-line:focus {
      border-bottom-color: var(--horizon-purple);
    }
    .input-line::placeholder { color: var(--text-dimmer); font-style: italic; }

    .hint {
      margin-top: 1.2rem;
      font-size: 0.7rem;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
    }

    /* Phase 2: words laid out breathing, clickable */
    .word-field {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem 1rem;
      margin: 1rem 0 2rem 0;
    }
    .word-field span {
      padding: 0.3rem 0.1rem;
      cursor: pointer;
      opacity: 0.6;
      transition: all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      animation: breathe 5s infinite ease-in-out;
      font-size: 1.05rem;
    }
    .word-field span:hover {
      opacity: 1;
      color: var(--horizon-cyan);
    }
    .word-field span.dissolving { opacity: 0; transform: translateY(8px); }

    /* Phase 3: mutations, stacked, clickable */
    .mutation-stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0 2rem 0;
    }
    .mutation-stack button {
      background: transparent;
      border: 1px solid var(--text-dimmer);
      color: var(--text-primary);
      padding: 0.9rem 1rem;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.15em;
      transition: all 0.25s ease;
    }
    .mutation-stack button:hover {
      border-color: var(--horizon-purple);
      color: var(--hawking-gold);
      transform: translateX(2px);
    }
    .mutation-label {
      font-size: 0.65rem;
      color: var(--text-dimmer);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      display: block;
    }

    /* Phase 4: two-column held tension */
    .held {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin: 1.5rem 0;
      align-items: stretch;
    }
    .held-col {
      padding: 1.2rem;
      border: 1px solid var(--text-dimmer);
      min-height: 5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }
    .held-col .who {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--text-dimmer);
      text-transform: uppercase;
    }
    .held-col .what {
      font-size: 1rem;
      color: var(--text-primary);
      letter-spacing: 0.1em;
    }
    .held-col.you { border-color: var(--horizon-purple-dim); }
    .held-col.prior { border-color: var(--horizon-purple-dim); opacity: 0.7; }
    .held-col.prior.ghost { color: var(--text-dimmer); }
    .tension-glyph {
      text-align: center;
      font-size: 1.4rem;
      color: var(--hawking-gold);
      margin: 0.2rem 0;
      animation: breathe 3s infinite ease-in-out;
    }

    /* Phase 5: null seal */
    .seal {
      font-size: 2.2rem;
      color: var(--text-primary);
      letter-spacing: 0.4em;
      margin: 2rem 0;
      animation: breathe 6s infinite ease-in-out;
      text-shadow: 0 0 20px var(--horizon-purple-dim);
    }
    .seal.committed {
      color: var(--hawking-gold);
      text-shadow: 0 0 40px rgba(255,217,122,0.4);
    }

    /* Generic action button */
    .act {
      background: transparent;
      border: 1px solid var(--horizon-purple-dim);
      color: var(--horizon-cyan);
      padding: 0.7rem 1.8rem;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .act:hover {
      border-color: var(--horizon-purple);
      color: var(--hawking-gold);
      box-shadow: 0 0 20px var(--horizon-purple-dim);
    }
    .act:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Meta / footer */
    .meta {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      font-size: 0.65rem;
      color: var(--text-dimmer);
      z-index: 3;
      letter-spacing: 0.1em;
    }
    .counter {
      position: fixed;
      top: 1rem;
      right: 1rem;
      font-size: 0.65rem;
      color: var(--text-dimmer);
      z-index: 3;
      letter-spacing: 0.15em;
    }

    /* Opening: what the prior visitor left */
    .inheritance {
      margin-bottom: 2.5rem;
      padding: 1rem;
      border-left: 2px solid var(--horizon-purple-dim);
      text-align: left;
      font-size: 0.8rem;
      color: var(--text-dim);
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .inheritance .tag {
      color: var(--text-dimmer);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.4rem;
    }
    .inheritance .seed-text {
      color: var(--hawking-gold);
      letter-spacing: 0.15em;
      font-size: 1.1rem;
    }
    .inheritance.empty .seed-text { color: var(--text-dim); font-style: italic; }

    @media (max-width: 560px) {
      .held { grid-template-columns: 1fr; }
      .glyph-row { font-size: 1.3rem; letter-spacing: 0.5rem; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="phase-1">

  <main class="stage">
    <!-- Phase glyphs across the top, one lights up per phase -->
    <div class="glyph-row" id="glyphRow">
      <span data-phase="1">🦷</span>
      <span data-phase="2">⟐</span>
      <span data-phase="3">♾️</span>
      <span data-phase="4">⿻</span>
      <span data-phase="5">∅</span>
    </div>

    <div class="phase-chip" id="phaseChip">PHASE 1 · INCISION</div>

    <!-- The body rebuilds per phase -->
    <div id="body"></div>
  </main>

  <div class="meta">∅→∅ · the crossing · v0.1</div>
  <div class="counter" id="counter">—</div>

  <script>
    // ──────────────────────────────────────────────────────────────
    //  THE CROSSING — five phases, typing-as-ritual.
    //  Each visitor crosses from what they brought to what they leave.
    //  What they leave is read only by the next visitor, who will never meet them.
    //  That's the whole point.
    // ──────────────────────────────────────────────────────────────

    const STORE_KEY = 'maw.crossing.inheritance.v1';
    const COUNT_KEY = 'maw.crossing.count.v1';

    // load what the previous visitor sealed (or null)
    function loadInheritance() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); }
      catch (e) { return null; }
    }
    function saveInheritance(obj) {
      // Returns true iff the seal actually persisted. A silent failure here
      // would make the ritual lie ("your trace remains only for the next"),
      // so commit() surfaces the failure visibly if this returns false.
      try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); return true; }
      catch (e) { return false; }
    }
    function bumpCount() {
      const n = parseInt(localStorage.getItem(COUNT_KEY) || '0', 10) + 1;
      try { localStorage.setItem(COUNT_KEY, String(n)); } catch (e) {}
      return n;
    }
    function getCount() {
      return parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);
    }

    // ── state the crossing carries between phases ──
    const state = {
      phase: 1,
      sentence: '',
      keptWord: '',
      mutations: null,
      survived: '',
      inheritance: loadInheritance(),
      crossingNum: getCount() + 1,
    };

    const body = document.getElementById('body');
    const chip = document.getElementById('phaseChip');
    const counter = document.getElementById('counter');
    counter.textContent = 'CROSSING #' + String(state.crossingNum).padStart(3, '0');

    function setPhase(n) {
      state.phase = n;
      document.body.className = 'phase-' + n;
      const labels = {
        1: 'PHASE 1 · 🦷 INCISION',
        2: 'PHASE 2 · ⟐ CONTAINMENT',
        3: 'PHASE 3 · ♾️ RECURSION',
        4: 'PHASE 4 · ⿻ TENSION',
        5: 'PHASE 5 · ∅ NULL SEAL',
      };
      chip.textContent = labels[n];

      // light the glyph row
      document.querySelectorAll('#glyphRow span').forEach(sp => {
        const p = parseInt(sp.dataset.phase, 10);
        sp.classList.remove('lit', 'passed');
        if (p === n) sp.classList.add('lit');
        else if (p < n) sp.classList.add('passed');
      });

      const phases = [phase1, phase2, phase3, phase4, phase5];
      phases[n - 1]();
    }

    // ── PHASE 1 · INCISION ───────────────────────────────────────
    function phase1() {
      const inh = state.inheritance;
      const inherited = inh
        ? `<div class="inheritance">
             <span class="tag">inherited from crossing #${inh.n}, ${inh.at}</span>
             <div class="seed-text">${escape(inh.seed)}</div>
           </div>`
        : `<div class="inheritance empty">
             <span class="tag">no prior crossing</span>
             <div class="seed-text">you are the first through</div>
           </div>`;

      body.innerHTML = `
        ${inherited}
        <div class="prompt">
          Type one sentence about <em>what is recursing in you right now.</em><br>
          Not a big thing. The nearest true thing.
        </div>
        <input id="in1" class="input-line" type="text"
               maxlength="280"
               autocomplete="off" spellcheck="false"
               placeholder="type · press enter">
        <div class="hint">enter to cross · esc to leave</div>
      `;
      const inp = document.getElementById('in1');
      inp.focus();
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const val = inp.value.trim();
          if (val.length < 3) return;
          state.sentence = val;
          setPhase(2);
        } else if (e.key === 'Escape') {
          window.location.reload();
        }
      });
    }

    // ── PHASE 2 · CONTAINMENT ────────────────────────────────────
    // sentence is broken into words; visitor keeps exactly one.
    function phase2() {
      const words = state.sentence.split(/\s+/).filter(Boolean);
      body.innerHTML = `
        <div class="prompt">
          The sentence is too much to carry further.<br>
          <em>Click one word to keep. The rest dissolve.</em>
        </div>
        <div class="word-field" id="wordField">
          ${words.map((w, i) => `<span data-i="${i}">${escape(w)}</span>`).join('')}
        </div>
        <div class="hint">one word only · no undo</div>
      `;
      const field = document.getElementById('wordField');
      field.querySelectorAll('span').forEach(sp => {
        sp.addEventListener('click', () => {
          const kept = sp.textContent;
          field.querySelectorAll('span').forEach(other => {
            if (other !== sp) other.classList.add('dissolving');
          });
          setTimeout(() => {
            state.keptWord = kept;
            setPhase(3);
          }, 900);
        });
      });
    }

    // ── PHASE 3 · RECURSION ──────────────────────────────────────
    // the kept word is structurally mutated three ways; visitor picks which survives.
    function phase3() {
      const w = state.keptWord;
      const muts = [
        { label: 'reversed',   value: reverseStr(w) },
        { label: 'vowels cut', value: cutVowels(w) },
        { label: 'letter one', value: w.length > 0 ? w[0].toUpperCase() : w },
      ].filter(m => m.value && m.value.length > 0);

      // also keep the original as an option — you can choose not to mutate
      muts.unshift({ label: 'unchanged', value: w });

      state.mutations = muts;

      body.innerHTML = `
        <div class="prompt">
          The word is run through structural transforms.<br>
          <em>Each produces something new. Pick the one that survives.</em>
        </div>
        <div class="mutation-stack" id="mutStack">
          ${muts.map((m, i) => `
            <div>
              <span class="mutation-label">${m.label}</span>
              <button data-i="${i}">${escape(m.value)}</button>
            </div>
          `).join('')}
        </div>
        <div class="hint">each pass compresses · pick one</div>
      `;
      document.querySelectorAll('#mutStack button').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.i, 10);
          state.survived = state.mutations[i].value;
          setPhase(4);
        });
      });
    }

    // ── PHASE 4 · TENSION ────────────────────────────────────────
    // hold the visitor's surviving form next to the prior crossing's, unresolved.
    function phase4() {
      const prior = state.inheritance;
      body.innerHTML = `
        <div class="prompt">
          Your seed and the last visitor's seed are held side by side.<br>
          <em>Neither resolves. Neither cancels.</em> This is the tension.
        </div>
        <div class="held">
          <div class="held-col you">
            <span class="who">you · #${state.crossingNum}</span>
            <span class="what">${escape(state.survived)}</span>
          </div>
          <div class="held-col prior ${prior ? '' : 'ghost'}">
            <span class="who">${prior ? 'prior · #' + prior.n : 'prior · none'}</span>
            <span class="what">${escape(prior ? prior.seed : '—')}</span>
          </div>
        </div>
        <div class="tension-glyph">⿻</div>
        <div style="text-align:center; margin-top:1.5rem;">
          <button class="act" id="toSeal">CROSS</button>
        </div>
        <div class="hint" style="margin-top:1.5rem;">
          you do not have to agree with them. you do not have to win.
        </div>
      `;
      document.getElementById('toSeal').addEventListener('click', () => setPhase(5));
    }

    // ── PHASE 5 · NULL SEAL ──────────────────────────────────────
    // commit to localStorage; the seed becomes the next visitor's inheritance.
    function phase5() {
      body.innerHTML = `
        <div class="prompt">
          The crossing closes by committing one thing to the void.<br>
          <em>What you commit is read only by the next visitor, who will never meet you.</em>
        </div>
        <div class="seal" id="sealGlyph">${escape(state.survived)}</div>
        <div style="text-align:center; margin-top:1rem;">
          <button class="act" id="commit">SEAL ∅</button>
        </div>
        <div class="hint" style="margin-top:1.8rem;">
          after this: the page goes dark. your trace remains only for the next.
        </div>
      `;
      document.getElementById('commit').addEventListener('click', () => {
        const now = new Date();
        const iso = now.toISOString().slice(0, 16).replace('T', ' ');
        const payload = {
          seed: state.survived,
          n: state.crossingNum,
          at: iso + 'Z',
        };
        const persisted = saveInheritance(payload);
        if (persisted) bumpCount();
        document.getElementById('sealGlyph').classList.add('committed');
        document.getElementById('commit').disabled = true;
        document.getElementById('commit').textContent = persisted ? 'SEALED' : 'UNSEALED';
        if (!persisted) {
          // Ritual credibility requires honesty about failure: if storage is
          // disabled (private mode, quota, denied permission), the trace did
          // NOT persist — tell the visitor instead of letting the page lie.
          const sealEl = document.getElementById('sealGlyph');
          sealEl.classList.remove('committed');
          sealEl.style.color = 'var(--compress-red)';
          const hint = document.createElement('div');
          hint.className = 'hint';
          hint.style.cssText = 'margin-top:1.8rem; color: var(--compress-red); letter-spacing:0.1em;';
          hint.textContent = '∅ could not hold — storage refused. the next visitor will not inherit this crossing.';
          sealEl.parentNode.appendChild(hint);
          return;
        }
        // breath out and let the glyph alone breathe
        setTimeout(() => {
          const b = document.getElementById('body');
          b.innerHTML = `
            <div class="seal committed" style="font-size:2.4rem; margin-top:3rem;">
              ${escape(state.survived)}
            </div>
            <div class="hint" style="margin-top:3rem;">
              ∅ — it is listening.
            </div>
          `;
          chip.textContent = 'CROSSED';
          document.querySelectorAll('#glyphRow span').forEach(sp => sp.classList.add('passed'));
        }, 1800);
      });
    }

    // ── utilities ────────────────────────────────────────────────
    function escape(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function reverseStr(s) { return s.split('').reverse().join(''); }
    function cutVowels(s) { return s.replace(/[aeiouAEIOU]/g, ''); }

    // ── boot ─────────────────────────────────────────────────────
    setPhase(1);
  </script>

</body>
</html>
