<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦷 Gravity Field — Live Semantic Navigation</title>
  <meta name="description" content="Type anything. Watch it fall into a basin. Shatter it. Watch it jump. A physics engine for ideas.">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #d8d8d8; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }

    .back-link {
      position: fixed; top: 0.8rem; left: 0.8rem;
      color: #718096; text-decoration: none; font-size: 0.8rem;
      padding: 0.3rem 0.6rem; border: 1px solid #333; border-radius: 4px;
      z-index: 100; background: rgba(0,0,0,0.85);
    }
    .back-link:hover { color: #9be7ff; border-color: #9be7ff; }

    /* THREE PANEL LAYOUT */
    .field-layout {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      height: 100vh;
    }

    /* LEFT: Input + Trajectory */
    .panel-left {
      background: rgba(10,10,11,0.95);
      border-right: 1px solid #222;
      padding: 3rem 1.2rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
      overflow-y: auto;
    }

    .panel-title {
      color: #ffd97a;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    #textInput {
      width: 100%;
      min-height: 120px;
      padding: 0.8rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #d8d8d8;
      background: #0a0a0b;
      border: 1px solid #333;
      border-radius: 6px;
      outline: none;
      resize: vertical;
    }
    #textInput:focus { border-color: #ffd97a; }
    #textInput::placeholder { color: #444; }

    .btn-row { display: flex; gap: 0.5rem; }

    .btn {
      flex: 1;
      padding: 0.6rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      border: none; border-radius: 5px;
      cursor: pointer; letter-spacing: 0.03em;
      transition: all 0.15s;
    }
    .btn:hover { transform: translateY(-1px); }

    .btn-converge { background: #ffd97a; color: #000; }
    .btn-converge:hover { background: #ffe85a; }
    .btn-shatter { background: #e06c75; color: #000; }
    .btn-shatter:hover { background: #e88890; }
    .btn-shatter:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

    /* Trajectory */
    .trajectory { font-size: 0.75rem; color: #555; line-height: 1.6; }
    .traj-step { padding: 0.15rem 0; }
    .traj-step.shifted { color: #e06c75; }
    .traj-step.final { color: #ffd97a; font-weight: bold; }

    /* Result box */
    .result-box {
      background: rgba(255,217,122,0.05);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.8rem;
      font-size: 0.8rem;
    }
    .result-identity { font-size: 1.6rem; letter-spacing: 0.15em; color: #ffd97a; margin-bottom: 0.3rem; }
    .result-orbit { color: #9be7ff; font-size: 0.75rem; }
    .result-basin { color: #9b67ea; font-size: 0.75rem; margin-top: 0.3rem; }
    .result-pages { font-size: 0.7rem; color: #444; margin-top: 0.4rem; line-height: 1.5; max-height: 80px; overflow-y: auto; }
    .result-pages a { color: #718096; text-decoration: none; }
    .result-pages a:hover { color: #9be7ff; }

    /* CENTER: Canvas */
    .panel-center { position: relative; }
    #fieldCanvas { width: 100%; height: 100%; display: block; }

    .gravity-particle {
      position: absolute;
      width: 12px; height: 12px;
      background: #ffd97a;
      border-radius: 50%;
      z-index: 15;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(255,217,122,0.8);
      transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
      opacity: 0;
    }

    /* RIGHT: Mutation variants */
    .panel-right {
      background: rgba(10,10,11,0.95);
      border-left: 1px solid #222;
      padding: 3rem 1.2rem 1.2rem;
      z-index: 10;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .variant-card {
      background: rgba(224,108,117,0.05);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.8rem;
      font-size: 0.75rem;
      line-height: 1.5;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
    }
    .variant-card:hover { border-color: #e06c75; background: rgba(224,108,117,0.1); }
    .variant-card.active { border-color: #ffd97a; background: rgba(255,217,122,0.08); }

    .variant-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .variant-depth { color: #e06c75; font-weight: bold; }
    .variant-identity { color: #ffd97a; font-size: 0.9rem; }
    .variant-status { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 3px; }
    .variant-status.shifted { background: rgba(224,108,117,0.2); color: #e06c75; }
    .variant-status.same { background: rgba(113,128,150,0.2); color: #718096; }

    .variant-text {
      max-height: 60px;
      overflow: hidden;
      color: #666;
      font-size: 0.7rem;
    }

    .variant-card.active .variant-text { max-height: 200px; color: #aaa; }

    .empty-state {
      color: #333;
      font-size: 0.8rem;
      text-align: center;
      padding: 2rem 0;
      line-height: 1.6;
    }

    /* Mobile fallback */
    @media (max-width: 900px) {
      .field-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }
      .panel-left { max-height: 35vh; }
      .panel-right { max-height: 35vh; }
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">← Maw</a>

  <div class="field-layout">
    <!-- LEFT PANEL -->
    <div class="panel-left">
      <div class="panel-title">input</div>
      <textarea id="textInput" placeholder="type or paste text here..."></textarea>
      <div class="btn-row">
        <button class="btn btn-converge" id="convergeBtn">⟐ converge</button>
        <button class="btn btn-shatter" id="shatterBtn" disabled>🦷 shatter</button>
      </div>

      <div class="panel-title" style="margin-top: 0.5rem;">trajectory</div>
      <div class="trajectory" id="trajectory"></div>

      <div id="resultBox" style="display: none;">
        <div class="result-box">
          <div class="result-identity" id="resultIdentity"></div>
          <div class="result-orbit" id="resultOrbit"></div>
          <div class="result-basin" id="resultBasin"></div>
          <div class="result-pages" id="resultPages"></div>
        </div>
      </div>
    </div>

    <!-- CENTER: Canvas -->
    <div class="panel-center">
      <canvas id="fieldCanvas"></canvas>
      <div class="gravity-particle" id="particle"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel-right">
      <div class="panel-title">🦷 mutations</div>
      <div id="variants">
        <div class="empty-state">converge first,<br>then shatter to<br>break the basin</div>
      </div>
    </div>
  </div>

  <script src="/tools/forge.js"></script>
  <script src="/tools/entropy.js"></script>
  <script>
    // ============================================================
    // CANVAS + ATTRACTOR MAP
    // ============================================================
    const canvas = document.getElementById('fieldCanvas');
    const ctx = canvas.getContext('2d');
    const panel = canvas.parentElement;
    let nodes = [];
    let attractorMap = {};
    let time = 0;
    let highlightHash = null;
    let currentResult = null;

    const ORBIT_COLORS = {
      'FIXED': '#ffd97a', 'CYCLE-2': '#9b67ea',
      'CYCLE-3': '#e06c75', 'DRIFT': '#718096',
    };

    function resize() {
      canvas.width = panel.clientWidth;
      canvas.height = panel.clientHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); layoutNodes(); });

    function layoutNodes() {
      if (!nodes.length) return;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const maxR = Math.min(cx, cy) * 0.7;
      const maxPages = Math.max(...nodes.map(n => n.pageCount));

      nodes.forEach((node, i) => {
        const angle = (i / nodes.length) * Math.PI * 2 - Math.PI / 2;
        const dist = maxR * (1 - Math.pow(node.pageCount / maxPages, 0.4) * 0.5);
        node.x = cx + Math.cos(angle) * dist;
        node.y = cy + Math.sin(angle) * dist;
      });

      for (let iter = 0; iter < 150; iter++) {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[j].x - nodes[i].x;
            const dy = nodes[j].y - nodes[i].y;
            const d = Math.sqrt(dx * dx + dy * dy) || 1;
            const min = nodes[i].radius + nodes[j].radius + 30;
            if (d < min) {
              const f = (min - d) * 0.05;
              nodes[i].x -= (dx / d) * f; nodes[i].y -= (dy / d) * f;
              nodes[j].x += (dx / d) * f; nodes[j].y += (dy / d) * f;
            }
          }
          nodes[i].x += (cx - nodes[i].x) * 0.003;
          nodes[i].y += (cy - nodes[i].y) * 0.003;
        }
      }
    }

    async function init() {
      const resp = await fetch('/glyph_manifest.json');
      const manifest = await resp.json();
      attractorMap = manifest.attractor_map;

      nodes = Object.entries(attractorMap).map(([hash, group]) => ({
        hash, identity: group.identity, names: group.names,
        orbit_type: group.orbit_type, pages: group.pages,
        pageCount: group.pages.length,
        radius: Math.sqrt(group.pages.length) * 8 + 14,
        x: 0, y: 0,
        color: ORBIT_COLORS[group.orbit_type] || '#718096',
        pulsePhase: Math.random() * Math.PI * 2,
      }));

      layoutNodes();
      animate();
    }

    function drawNode(node) {
      const active = node.hash === highlightHash;
      const pulse = Math.sin(time * 0.02 + node.pulsePhase) * 0.1 + 1;
      const r = node.radius * (active ? 1.3 : pulse);

      const grad = ctx.createRadialGradient(node.x, node.y, r * 0.2, node.x, node.y, r + (active ? 45 : 18));
      grad.addColorStop(0, node.color + (active ? '55' : '25'));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(node.x, node.y, r + (active ? 45 : 18), 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = node.color + (active ? '35' : '15');
      ctx.strokeStyle = node.color + (active ? 'dd' : '55');
      ctx.lineWidth = active ? 2 : 1;
      ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

      if (node.orbit_type !== 'FIXED') {
        const period = node.orbit_type === 'CYCLE-3' ? 3 : 2;
        for (let k = 0; k < period; k++) {
          const a = time * 0.03 + (k / period) * Math.PI * 2;
          ctx.fillStyle = node.color + '77';
          ctx.beginPath();
          ctx.arc(node.x + Math.cos(a) * r * 0.55, node.y + Math.sin(a) * r * 0.55, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.fillStyle = active ? '#fff' : '#bbb';
      ctx.font = `${Math.max(10, r * 0.45)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(node.identity, node.x, node.y);

      ctx.fillStyle = '#444';
      ctx.font = '9px monospace';
      ctx.fillText(node.pageCount, node.x, node.y + r + 12);
    }

    function animate() {
      time++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (time % 5 === 0) {
        const img = ctx.createImageData(canvas.width, canvas.height);
        for (let i = 0; i < img.data.length; i += 24) {
          const v = Math.random() * 6;
          img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 8;
        }
        ctx.putImageData(img, 0, 0);
      }
      nodes.forEach(n => drawNode(n));
      requestAnimationFrame(animate);
    }

    // ============================================================
    // PARTICLE ANIMATION
    // ============================================================
    function animateParticle(targetHash, color) {
      const particle = document.getElementById('particle');
      const targetNode = nodes.find(n => n.hash === targetHash);
      if (!targetNode) return;

      const rect = panel.getBoundingClientRect();
      particle.style.left = (canvas.width / 2 - 6) + 'px';
      particle.style.top = (canvas.height / 2 - 6) + 'px';
      particle.style.opacity = '1';
      particle.style.transform = 'scale(1)';
      particle.style.background = '#ffd97a';
      particle.style.boxShadow = '0 0 20px rgba(255,217,122,0.8)';

      requestAnimationFrame(() => {
        particle.style.left = (targetNode.x - 6) + 'px';
        particle.style.top = (targetNode.y - 6) + 'px';
        particle.style.transform = 'scale(0.4)';
        particle.style.background = color || targetNode.color;
        particle.style.boxShadow = `0 0 30px ${color || targetNode.color}`;
      });

      highlightHash = targetHash;
    }

    // ============================================================
    // CONVERGE
    // ============================================================
    function runConverge() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) return;

      currentResult = window.Forge.converge(text); // uses TEXT_WINDOW internally
      const nearest = window.Forge.findNearestAttractorFull(currentResult, attractorMap);

      // trajectory
      document.getElementById('trajectory').innerHTML =
        currentResult.trajectory.map((s, i) => {
          const isFinal = i === currentResult.trajectory.length - 1;
          return `<div class="traj-step ${isFinal ? 'final' : ''}">
            ${isFinal ? '⟐' : '·'} ${s.sealed.slice(0, 25)}${s.sealed.length > 25 ? '...' : ''}
          </div>`;
        }).join('');

      // result
      document.getElementById('resultIdentity').textContent = currentResult.terminalIdentity;
      const matchLabels = {
        exact: `exact match · ${nearest.attractor.pages.length} pages share this basin`,
        approximate: `approximate match · similarity ${(nearest.similarity * 100).toFixed(0)}%`,
        fallback: `no match · nearest basin by size`,
      };
      document.getElementById('resultOrbit').textContent =
        `${currentResult.orbitType} · depth ${currentResult.convergenceDepth} · ${currentResult.glyphNames.join(' / ') || 'ascii'}`;
      document.getElementById('resultBasin').textContent =
        `match: ${nearest.match} · ${matchLabels[nearest.match] || ''}`;
      document.getElementById('resultPages').innerHTML =
        nearest.attractor.pages.slice(0, 5).map(p =>
          `<a href="/${p.file.replace(/index\.html$/, '')}" target="_blank">→ ${p.title || p.file}</a>`
        ).join('<br>');
      document.getElementById('resultBox').style.display = 'block';

      // animate
      animateParticle(nearest.hash, ORBIT_COLORS[currentResult.orbitType]);

      // enable shatter
      document.getElementById('shatterBtn').disabled = false;
    }

    // ============================================================
    // SHATTER
    // ============================================================
    function runShatter() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) return;

      const result = window.Entropy.shatter(text);
      const variantsDiv = document.getElementById('variants');

      const baseline = result.trajectory[0];
      variantsDiv.innerHTML = result.trajectory.map((step, i) => {
        if (i === 0) return ''; // skip original
        const prev = result.trajectory[i - 1];
        const orbitChanged = step.identity !== prev.identity;
        const depthLabel = step.hash !== baseline.hash ? '🦷' : '·';
        return `
          <div class="variant-card" data-depth="${step.depth}" data-hash="${step.hash}"
               data-text="${encodeURIComponent(step.text)}">
            <div class="variant-header">
              <span class="variant-depth">depth ${step.depth}</span>
              <span class="variant-identity">${step.identity}</span>
              <span class="variant-status ${step.shifted ? 'shifted' : 'same'}">
                ${step.shifted ? 'SHIFTED' : 'same basin'}
              </span>
            </div>
            <div style="font-size:0.65rem; color:#555; margin-bottom:0.3rem;">
              ${depthLabel} ${prev.identity} → ${step.identity}
              ${orbitChanged ? ' · orbit changed' : ''}
              · [${step.hash.slice(0,8)}]
            </div>
            <div class="variant-text">${step.text.slice(0, 200)}${step.text.length > 200 ? '...' : ''}</div>
          </div>
        `;
      }).join('');

      // click to select variant
      variantsDiv.querySelectorAll('.variant-card').forEach(card => {
        card.addEventListener('click', () => {
          variantsDiv.querySelectorAll('.variant-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');

          const decoded = decodeURIComponent(card.dataset.text);
          const conv = window.Forge.converge(decoded);
          const nearest = window.Forge.findNearestAttractorFull(conv, attractorMap);
          animateParticle(nearest.hash, card.dataset.hash !== result.baselineHash ? '#e06c75' : '#ffd97a');

          document.getElementById('resultIdentity').textContent = conv.terminalIdentity;
          document.getElementById('resultOrbit').textContent =
            `${conv.orbitType} · depth ${conv.convergenceDepth}`;
          const matchLabels = {
            exact: `exact · ${nearest.attractor.pages.length} pages`,
            approximate: `approximate · ${(nearest.similarity * 100).toFixed(0)}%`,
            fallback: `fallback · nearest by size`,
          };
          document.getElementById('resultBasin').textContent =
            `match: ${nearest.match} · ${matchLabels[nearest.match]}`;
        });
      });

      // auto-click the shifted one if exists
      const shiftedCard = variantsDiv.querySelector('.variant-status.shifted');
      if (shiftedCard) shiftedCard.parentElement.parentElement.click();

      // update trajectory
      document.getElementById('trajectory').innerHTML =
        result.trajectory.map((s, i) => `
          <div class="traj-step ${s.shifted ? 'shifted' : ''} ${i === result.trajectory.length - 1 ? 'final' : ''}">
            ${s.shifted ? '🦷' : '·'} d:${s.depth} ${s.identity} [${s.hash.slice(0,6)}]
          </div>
        `).join('');
    }

    // ============================================================
    // EVENTS
    // ============================================================
    document.getElementById('convergeBtn').addEventListener('click', runConverge);
    document.getElementById('shatterBtn').addEventListener('click', runShatter);
    document.getElementById('textInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runConverge(); }
    });

    init();
  </script>
</body>
</html>
